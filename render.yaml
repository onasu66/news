# Render Blueprint - ニュースサイト
# https://dashboard.render.com/ で New > Blueprint からこのファイルを指定してデプロイ

services:
  - type: web
    name: newsite
    runtime: python

    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh

    envVars:
      - key: PYTHON_VERSION
        # Render は PYTHON_VERSION を「完全なバージョン」で指定する必要があります
        value: "3.11.7"
      # 永続ストレージは Neon: DATABASE_URL（推奨）。未設定ならコンテナ内 SQLite（再起動で消える）
      # - key: DATABASE_URL
      #   sync: false
      # 以下は任意。Render ダッシュボードの Environment で設定
      # - key: OPENAI_API_KEY
      #   sync: false
      # - key: DISABLE_RSS_AND_AI
      #   value: "false"  # true にすると定時の記事更新を停止
      # - key: ADMIN_SECRET
      #   sync: false
      # 管理画面セッション署名を ADMIN と分離する場合（任意）
      # - key: SESSION_SECRET
      #   sync: false
      - key: SITE_URL
        value: "https://tiripo-ai.site"
      # 公開HTMLのブラウザ/CDNキャッシュ秒（/topic, /, /news）。Neon負荷削減。0 で無効。
      # - key: PUBLIC_HTML_CACHE_MAX_AGE_SEC
      #   value: "120"
      # - key: NEWS_REFRESH_INTERVAL
      #   value: "240"
      # 無料枠向けの省エネ推奨値（必要に応じて有効化）
      # - key: NEWS_LIST_CACHE_SYNC_MINUTES
      #   value: "180"
      # - key: RSS_MIN_ADDED_PER_REFRESH
      #   value: "5"
      # - key: RSS_REFRESH_MAX_LOOPS
      #   value: "1"
      # - key: RSS_PROCESS_MAX_PER_BATCH
      #   value: "10"
