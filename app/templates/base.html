<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="{% block meta_description %}知リポAI - 最新ニュースをAIが知的に解説。信頼メディアから収集し、背景・ポイントを解説する知的ニュースレポートです。{% endblock %}">
    <meta name="keywords" content="論文,ai,チリポ,ちりぽ,ニュース,要約,AIニュース,研究論文,知リポAI">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "知リポAI",
      "alternateName": ["チリポ", "ちりぽ"],
      "keywords": "論文, ai, チリポ, ちりぽ, ニュース, 要約",
      "url": "/"
    }
    </script>
    <title>{% block title %}知リポAI{% endblock %}</title>
    {% block meta_extra %}{% endblock %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/static/site-imgs/ファビコン.png">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <a class="skip-link" href="#main-content">本文へスキップ</a>
    <header class="site-header">
        <div class="header-inner">
            <a href="/" class="logo-wrap" aria-label="知リポAI ホームへ">
                <span class="logo" aria-hidden="true"><img src="/static/site-imgs/ロゴ.png" alt="" class="logo-image"><span class="logo-text">知リポAI</span></span>
                <span class="logo-tagline" aria-hidden="true">AIが解説する知的ニュース</span>
            </a>
            <nav class="global-pill-nav" aria-label="グローバルナビゲーション">
                <a href="/" class="global-pill{% if request.url.path == '/' %} is-active{% endif %}" {% if request.url.path == '/' %}aria-current="page"{% endif %}>AI論文解説</a>
                <a href="/news" class="global-pill{% if request.url.path == '/news' %} is-active{% endif %}" {% if request.url.path == '/news' %}aria-current="page"{% endif %}>AIニュースアーカイブ</a>
                <a href="/personas" class="global-pill{% if request.url.path == '/personas' %} is-active{% endif %}" {% if request.url.path == '/personas' %}aria-current="page"{% endif %}>14キャラクター</a>
            </nav>
            <button type="button" id="theme-toggle" class="theme-toggle" aria-label="ダークテーマに切り替え" aria-pressed="false">🌙</button>
        </div>
    </header>

    <main id="main-content" class="main-content" tabindex="-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <p>知リポAI — 最新ニュースをAIが解説する、知的ニュースレポート</p>
            <div class="tiny-links"><a href="/personas">14キャラクター</a> · <a href="/about">運営者</a> · <a href="/authors">著者</a></div>
        </div>
    </footer>

    <nav class="mobile-bottom-bar" aria-label="モバイルナビ">
        <a href="/" class="bottom-bar-item{% if request.url.path == '/' or (mobile_nav_papers_highlight|default(false)) %} is-active{% endif %}"{% if request.url.path == '/' %} aria-current="page"{% elif mobile_nav_papers_highlight|default(false) %} aria-current="page"{% endif %}>
            <span class="bottom-bar-icon" aria-hidden="true">📄</span><span class="bottom-bar-label">論文</span>
        </a>
        <a href="/news" class="bottom-bar-item{% if request.url.path == '/news' or (mobile_nav_news_highlight|default(false)) %} is-active{% endif %}"{% if request.url.path == '/news' %} aria-current="page"{% elif mobile_nav_news_highlight|default(false) %} aria-current="page"{% endif %}>
            <span class="bottom-bar-icon" aria-hidden="true">🏠</span><span class="bottom-bar-label">ニュース</span>
        </a>
        <a href="/ai" class="bottom-bar-item{% if request.url.path == '/ai' %} is-active{% endif %}"{% if request.url.path == '/ai' %} aria-current="page"{% endif %}>
            <span class="bottom-bar-icon" aria-hidden="true">🤖</span><span class="bottom-bar-label">AI</span>
        </a>
        <a href="/search" class="bottom-bar-item{% if request.url.path == '/search' %} is-active{% endif %}"{% if request.url.path == '/search' %} aria-current="page"{% endif %}>
            <span class="bottom-bar-icon" aria-hidden="true">🔍</span><span class="bottom-bar-label">探す</span>
        </a>
        <a href="/saved" class="bottom-bar-item{% if request.url.path == '/saved' %} is-active{% endif %}"{% if request.url.path == '/saved' %} aria-current="page"{% endif %}>
            <span class="bottom-bar-icon" aria-hidden="true">⭐</span><span class="bottom-bar-label">保存</span>
        </a>
        <a href="/personas" class="bottom-bar-item{% if request.url.path == '/personas' %} is-active{% endif %}"{% if request.url.path == '/personas' %} aria-current="page"{% endif %}>
            <span class="bottom-bar-icon" aria-hidden="true">🎭</span><span class="bottom-bar-label">キャラ</span>
        </a>
    </nav>

    <div id="site-toast-region" class="site-toast-region"></div>
    <div id="site-announcer" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>

    <script>
    (function() {
        var root = document.documentElement;
        var savedTheme = localStorage.getItem('theme_mode');
        if (savedTheme === 'dark') root.setAttribute('data-theme', 'dark');
        var btn = document.getElementById('theme-toggle');
        if (!btn) return;
        function syncThemeUi() {
            var isDark = root.getAttribute('data-theme') === 'dark';
            btn.textContent = isDark ? '☀️' : '🌙';
            btn.setAttribute('aria-pressed', isDark ? 'true' : 'false');
            btn.setAttribute('aria-label', isDark ? 'ライトテーマに切り替え' : 'ダークテーマに切り替え');
        }
        syncThemeUi();
        btn.addEventListener('click', function() {
            var dark = root.getAttribute('data-theme') === 'dark';
            if (dark) {
                root.removeAttribute('data-theme');
                localStorage.setItem('theme_mode', 'light');
            } else {
                root.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme_mode', 'dark');
            }
            syncThemeUi();
        });
    })();
    window.showSiteToast = function(message, isError) {
        var region = document.getElementById('site-toast-region');
        if (!region || !message) return;
        var el = document.createElement('div');
        el.className = 'site-toast' + (isError ? ' site-toast--error' : '');
        if (isError) el.setAttribute('role', 'alert');
        el.textContent = message;
        region.appendChild(el);
        setTimeout(function() {
            el.remove();
        }, isError ? 5200 : 3200);
    };
    window.announceToScreenReader = function(text) {
        var a = document.getElementById('site-announcer');
        if (!a || !text) return;
        a.textContent = '';
        setTimeout(function() { a.textContent = text; }, 50);
    };
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
