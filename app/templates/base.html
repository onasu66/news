<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="{% block meta_description %}知リポAI - 最新ニュースをAIが知的に解説。信頼メディアから収集し、背景・ポイントを解説する知的ニュースレポートです。{% endblock %}">
    <title>{% block title %}知リポAI{% endblock %}</title>
    {% block meta_extra %}{% endblock %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="/" class="logo-wrap">
                <span class="logo"><span class="logo-icon">📰</span>知リポAI</span>
                <span class="logo-tagline">AIが解説する知的ニュース</span>
            </a>
            <button type="button" id="theme-toggle" class="theme-toggle" aria-label="ダークモード切替">🌙</button>
        </div>
    </header>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <p>知リポAI — 最新ニュースをAIが解説する、知的ニュースレポート</p>
            <div class="tiny-links"><a href="/about">運営者</a> · <a href="/authors">著者</a></div>
        </div>
    </footer>

    <nav class="mobile-bottom-bar" aria-label="モバイルナビ">
        <a href="/" class="bottom-bar-item{% if request.url.path == '/' %} is-active{% endif %}">
            <span class="bottom-bar-icon">📄</span><span class="bottom-bar-label">論文</span>
        </a>
        <a href="/news" class="bottom-bar-item{% if request.url.path == '/news' %} is-active{% endif %}">
            <span class="bottom-bar-icon">🏠</span><span class="bottom-bar-label">ニュース</span>
        </a>
        <a href="/ai" class="bottom-bar-item{% if request.url.path == '/ai' %} is-active{% endif %}">
            <span class="bottom-bar-icon">🤖</span><span class="bottom-bar-label">AI</span>
        </a>
        <a href="/search" class="bottom-bar-item{% if request.url.path == '/search' %} is-active{% endif %}">
            <span class="bottom-bar-icon">🔍</span><span class="bottom-bar-label">探す</span>
        </a>
        <a href="/saved" class="bottom-bar-item{% if request.url.path == '/saved' %} is-active{% endif %}">
            <span class="bottom-bar-icon">⭐</span><span class="bottom-bar-label">保存</span>
        </a>
    </nav>

    <script>
    (function() {
        var root = document.documentElement;
        var savedTheme = localStorage.getItem('theme_mode');
        if (savedTheme === 'dark') root.setAttribute('data-theme', 'dark');
        var btn = document.getElementById('theme-toggle');
        if (!btn) return;
        btn.textContent = root.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
        btn.addEventListener('click', function() {
            var dark = root.getAttribute('data-theme') === 'dark';
            if (dark) {
                root.removeAttribute('data-theme');
                localStorage.setItem('theme_mode', 'light');
                btn.textContent = '🌙';
            } else {
                root.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme_mode', 'dark');
                btn.textContent = '☀️';
            }
        });
    })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
